<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>BINGO CARD</title>
  <style>
    :root {
      --bg1: #ff365f;
      --bg2: #ffb000;
      --bg3: #00a7ff;
      --card: #ffffff;
      --ink: #22223a;
      --muted: #656575;
      --marked: #24c36b;
      --marked-ink: #17412a;
      --line: rgba(255, 255, 255, 0.55);
      --shadow: 0 18px 45px rgba(31, 22, 48, 0.24);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow-x: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 12%, rgba(255, 255, 255, 0.58), transparent 0 12%, transparent 13%),
        radial-gradient(circle at 86% 16%, rgba(255, 255, 255, 0.35), transparent 0 9%, transparent 10%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 50%, var(--bg3));
    }

    body {
      padding: max(14px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom));
    }

    .app {
      width: min(100%, 460px);
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.28);
    }

    h1 {
      margin: 6px 0 4px;
      font-size: clamp(34px, 10vw, 48px);
      line-height: 1;
      letter-spacing: 0;
      font-weight: 1000;
    }

    .status {
      min-height: 58px;
      margin: 12px 0 10px;
      display: grid;
      place-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 8px 22px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
      font-size: 24px;
      font-weight: 1000;
      color: #ff2e62;
      transform: scale(1);
      transition: transform 180ms ease, opacity 180ms ease;
    }

    .badge.bingo {
      min-height: 56px;
      font-size: clamp(42px, 13vw, 64px);
      color: white;
      background: linear-gradient(135deg, #ff2e62, #ffcf24, #21c76f);
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.18);
      animation: pop 700ms ease infinite alternate;
    }

    .badge.hidden {
      opacity: 0;
      transform: scale(0.84);
    }

    @keyframes pop {
      from { transform: scale(1); }
      to { transform: scale(1.06); }
    }

    .card-wrap {
      padding: 12px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.3);
      border: 2px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .letters,
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .letters {
      margin-bottom: 8px;
    }

    .letter {
      display: grid;
      place-items: center;
      height: 42px;
      border-radius: 14px;
      background: #202046;
      color: white;
      font-size: 30px;
      font-weight: 1000;
      box-shadow: inset 0 -4px 0 rgba(255, 255, 255, 0.12);
    }

    .cell {
      position: relative;
      display: grid;
      place-items: center;
      width: 100%;
      aspect-ratio: 1;
      border: 0;
      border-radius: 18px;
      background: var(--card);
      color: var(--ink);
      box-shadow: inset 0 -6px 0 rgba(34, 34, 58, 0.08), 0 6px 12px rgba(0, 0, 0, 0.14);
      font-size: clamp(22px, 8vw, 34px);
      font-weight: 1000;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 120ms ease, background 160ms ease, color 160ms ease;
    }

    .cell:active {
      transform: scale(0.96);
    }

    .cell.marked {
      color: rgba(23, 65, 42, 0.72);
      background: #d8ffe7;
    }

    .cell.marked::after {
      content: "";
      position: absolute;
      inset: 13%;
      border: clamp(5px, 1.5vw, 8px) solid var(--marked);
      border-radius: 999px;
      box-shadow: 0 0 0 4px rgba(36, 195, 107, 0.12);
      pointer-events: none;
    }

    .cell.free {
      font-size: clamp(15px, 4.6vw, 21px);
      color: #ffffff;
      background: linear-gradient(135deg, #8c35ff, #ff38aa);
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.24);
    }

    .cell.free.marked::after {
      border-color: #fff84d;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 14px 0 10px;
    }

    .action {
      min-height: 52px;
      border: 0;
      border-radius: 16px;
      padding: 10px 12px;
      font-size: 17px;
      font-weight: 1000;
      color: #16162f;
      background: #fff;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.18);
      touch-action: manipulation;
    }

    .action.primary {
      background: #fff04b;
    }

    .action.danger {
      color: #ff2e62;
    }

    .meta,
    .note {
      margin: 8px 4px 0;
      color: white;
      font-size: 13px;
      line-height: 1.6;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.22);
    }

    .note {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>BINGO CARD</h1>
    </header>

    <section class="status" aria-live="polite">
      <div id="statusBadge" class="badge hidden">リーチ！</div>
    </section>

    <section class="card-wrap" aria-label="ビンゴカード">
      <div class="letters" aria-hidden="true">
        <div class="letter">B</div>
        <div class="letter">I</div>
        <div class="letter">N</div>
        <div class="letter">G</div>
        <div class="letter">O</div>
      </div>
      <div id="cardGrid" class="grid"></div>
    </section>

    <section class="actions">
      <button id="newCardButton" class="action primary" type="button">新しいカード作成</button>
      <button id="resetButton" class="action danger" type="button">リセット</button>
    </section>

    <p id="createdAt" class="meta"></p>
    <p class="note">番号が呼ばれたらセルをタップしてください。FREEは最初から選択済みです。同じ端末では再読み込みしてもカードとタップ状態が保持されます。</p>
  </main>

  <script>
    (() => {
      "use strict";

      const STORAGE_KEY = "bingoCardState.v1";
      const FREE_INDEX = 12;
      const ranges = [
        [1, 15],
        [16, 30],
        [31, 45],
        [46, 60],
        [61, 75]
      ];

      const grid = document.getElementById("cardGrid");
      const statusBadge = document.getElementById("statusBadge");
      const createdAt = document.getElementById("createdAt");
      const newCardButton = document.getElementById("newCardButton");
      const resetButton = document.getElementById("resetButton");

      let state = loadState();

      render();

      newCardButton.addEventListener("click", () => {
        if (!confirm("新しいカードを作成しますか？現在のカードとタップ状態は消えます。")) {
          return;
        }

        state = createState();
        saveState();
        render();
      });

      resetButton.addEventListener("click", () => {
        if (!confirm("タップ状態をリセットしますか？カード番号はそのままです。")) {
          return;
        }

        state.marked = createInitialMarked();
        saveState();
        render();
      });

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            return createState();
          }

          const parsed = JSON.parse(raw);
          if (!isValidState(parsed)) {
            return createState();
          }

          parsed.marked[FREE_INDEX] = true;
          return parsed;
        } catch {
          return createState();
        }
      }

      function isValidState(value) {
        return Array.isArray(value?.numbers)
          && value.numbers.length === 25
          && Array.isArray(value?.marked)
          && value.marked.length === 25
          && typeof value.createdAt === "string";
      }

      function createState() {
        const numbers = [];

        ranges.forEach(([min, max], column) => {
          const values = shuffle(range(min, max)).slice(0, 5);
          values.forEach((number, row) => {
            numbers[row * 5 + column] = number;
          });
        });

        numbers[FREE_INDEX] = "FREE";

        return {
          numbers,
          marked: createInitialMarked(),
          createdAt: new Date().toISOString()
        };
      }

      function createInitialMarked() {
        return Array.from({ length: 25 }, (_, index) => index === FREE_INDEX);
      }

      function range(min, max) {
        return Array.from({ length: max - min + 1 }, (_, index) => min + index);
      }

      function shuffle(values) {
        const copy = [...values];
        for (let index = copy.length - 1; index > 0; index -= 1) {
          const target = Math.floor(Math.random() * (index + 1));
          [copy[index], copy[target]] = [copy[target], copy[index]];
        }
        return copy;
      }

      function render() {
        grid.innerHTML = "";

        state.numbers.forEach((value, index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = ["cell", state.marked[index] ? "marked" : "", index === FREE_INDEX ? "free" : ""].join(" ").trim();
          button.textContent = value;
          button.setAttribute("aria-label", index === FREE_INDEX ? "FREE" : `${value}番`);
          button.setAttribute("aria-pressed", state.marked[index] ? "true" : "false");

          if (index !== FREE_INDEX) {
            button.addEventListener("click", () => toggleCell(index));
          }

          grid.appendChild(button);
        });

        renderStatus();
        renderCreatedAt();
        saveState();
      }

      function toggleCell(index) {
        state.marked[index] = !state.marked[index];
        render();
      }

      function renderStatus() {
        const result = getResult();

        if (result === "bingo") {
          statusBadge.textContent = "BINGO!!";
          statusBadge.className = "badge bingo";
          return;
        }

        if (result === "reach") {
          statusBadge.textContent = "リーチ！";
          statusBadge.className = "badge";
          return;
        }

        statusBadge.textContent = "リーチ！";
        statusBadge.className = "badge hidden";
      }

      function renderCreatedAt() {
        const date = new Date(state.createdAt);
        createdAt.textContent = Number.isNaN(date.getTime())
          ? ""
          : `作成日時: ${date.toLocaleString()}`;
      }

      function getResult() {
        const lines = getLines();
        const selectedCounts = lines.map(line => line.filter(index => state.marked[index]).length);

        if (selectedCounts.some(count => count === 5)) {
          return "bingo";
        }

        if (selectedCounts.some(count => count === 4)) {
          return "reach";
        }

        return "none";
      }

      function getLines() {
        const lines = [];

        for (let row = 0; row < 5; row += 1) {
          lines.push([0, 1, 2, 3, 4].map(column => row * 5 + column));
        }

        for (let column = 0; column < 5; column += 1) {
          lines.push([0, 1, 2, 3, 4].map(row => row * 5 + column));
        }

        lines.push([0, 6, 12, 18, 24]);
        lines.push([4, 8, 12, 16, 20]);

        return lines;
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }
    })();
  </script>
</body>
</html>
